services:
  app:
    build: .
    container_name: ytdigest
    ports:
      - "8000:8000"
    env_file:
      - .env                              # API keys injected at runtime, never baked into image
    volumes:
      - ./data:/app/data                  # SQLite DB persists across restarts
      - ./logs:/app/logs                  # Log files accessible from host
      - ./config.yaml:/app/config.yaml:ro # Edit channels without rebuilding
    restart: unless-stopped
